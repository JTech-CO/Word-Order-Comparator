# GitHub Pages 배포: GROK_API_KEY를 js/config.js에 주입 후 정적 사이트 배포
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GROK_API_KEY into js/config.js
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const key = process.env.GROK_API_KEY;
          if (!key) {
            console.error('❌ GROK_API_KEY가 비어있습니다!');
            console.error('해결 방법:');
            console.error('1. GitHub 저장소 -> Settings -> Secrets and variables -> Actions에 [GROK_API_KEY]가 있는지 확인하세요.');
            console.error('2. 만약 [Environments] -> [github-pages] 비밀값으로 설정했다면, 해당 키를 Repository Secret으로 옮기거나 추가 설정을 하세요.');
            process.exit(1);
          }
          const escaped = key
            .replace(/\\\\/g, '\\\\\\\\')
            .replace(/\"/g, '\\\\\"')
            .replace(/\\n/g, '\\\\n')
            .replace(/\\r/g, '\\\\r');
          let c = fs.readFileSync('js/config.js', 'utf8');
          c = c.replace(/__GROK_API_KEY__/g, escaped);
          fs.writeFileSync('js/config.js', c);
          "

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
