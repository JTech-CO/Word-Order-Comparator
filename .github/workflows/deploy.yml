name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          echo "=== 치환 전: 플레이스홀더 확인 ==="
          grep -rn "__GROK_API_KEY__" . --include="*.js" --include="*.html" || echo "플레이스홀더 없음"

          echo "=== sed 치환 실행 ==="
          find . -type f \( -name "*.html" -o -name "*.js" \) \
            -exec sed -i 's/__GROK_API_KEY__/${{ secrets.GROK_API_KEY }}/g' {} +

          echo "=== 치환 후: 잔존 여부 확인 ==="
          if grep -rq "__GROK_API_KEY__" . --include="*.js" --include="*.html"; then
            echo "::error::치환되지 않은 플레이스홀더가 남아있습니다! GROK_API_KEY 시크릿을 확인하세요."
            exit 1
          else
            echo "모든 플레이스홀더가 정상 치환되었습니다."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
